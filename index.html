<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS – Voice Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4A017;
      --gold-dim: #8B6914;
      --bg: #050505;
      --surface: #0D0D0D;
      --border: #1a1a1a;
      --text: #E8E8E8;
      --muted: #555;
      --red: #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,160,23,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* Header */
    .header { text-align: center; }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(212,160,23,0.4);
    }
    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Orb */
    .orb-wrap {
      position: relative;
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(212,160,23,0.2);
    }
    .orb-ring:nth-child(1) { width: 180px; height: 180px; }
    .orb-ring:nth-child(2) { width: 140px; height: 140px; border-color: rgba(212,160,23,0.12); }

    .orb {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a1f00, #0a0800);
      border: 2px solid var(--gold-dim);
      box-shadow: 0 0 30px rgba(212,160,23,0.15), inset 0 0 20px rgba(0,0,0,0.8);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    .orb:hover { box-shadow: 0 0 50px rgba(212,160,23,0.35), inset 0 0 20px rgba(0,0,0,0.8); }
    .orb.listening {
      border-color: var(--gold);
      box-shadow: 0 0 60px rgba(212,160,23,0.6), inset 0 0 20px rgba(0,0,0,0.6);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .orb.speaking {
      border-color: #4fc3f7;
      box-shadow: 0 0 60px rgba(79,195,247,0.4), inset 0 0 20px rgba(0,0,0,0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .mic-icon { font-size: 2rem; user-select: none; }

    /* Status */
    .status {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      height: 18px;
      transition: color 0.3s;
    }
    .status.active { color: var(--gold); }
    .status.speaking { color: #4fc3f7; }
    .status.error { color: var(--red); }

    /* Chat log */
    .chat-log {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 220px;
      max-height: 300px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-log:empty::after {
      content: 'Say something to begin...';
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      align-self: center;
      margin: auto;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 85%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.jarvis { align-self: flex-start; }

    .msg-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }
    .msg.user .msg-label { color: var(--gold-dim); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .msg.user .msg-bubble {
      background: rgba(212,160,23,0.12);
      border: 1px solid rgba(212,160,23,0.2);
      color: #f0d080;
    }
    .msg.jarvis .msg-bubble {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* Voice selector */
    .voice-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
    }
    .voice-select:focus { border-color: var(--gold-dim); }

    /* Footer note */
    .note {
      font-size: 0.7rem;
      color: #333;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">JARVIS</div>
    <div class="tagline">Just A Rather Very Intelligent System</div>
  </div>

  <div class="orb-wrap">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb" id="orb" onclick="toggleListen()" title="Click to speak">
      <span class="mic-icon" id="mic-icon">🎙️</span>
    </div>
  </div>

  <div class="status" id="status">Click the orb to speak</div>

  <div class="chat-log" id="chat-log"></div>

  <div class="controls">
    <select class="voice-select" id="voice-select" title="Choose voice"></select>
    <button class="btn" onclick="speakTest()">Test Voice</button>
    <button class="btn danger" onclick="clearChat()">Clear</button>
  </div>

  <div class="note">Powered by Web Speech API · Works best in Chrome</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let recognition = null;
  let synth = window.speechSynthesis;
  let voices = [];
  let isListening = false;
  let isSpeaking = false;

  // ── Voices ─────────────────────────────────────────────────────────────────
  function loadVoices() {
    voices = synth.getVoices();
    const sel = document.getElementById('voice-select');
    sel.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('david') || v.name.toLowerCase().includes('james')) {
        opt.selected = true;
      }
      sel.appendChild(opt);
    });
  }
  synth.onvoiceschanged = loadVoices;
  loadVoices();

  // ── Speech Recognition setup ───────────────────────────────────────────────
  function setupRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setStatus('Speech not supported — use Chrome', 'error');
      return null;
    }
    const r = new SR();
    r.lang = 'en-US';
    r.interimResults = false;
    r.maxAlternatives = 1;

    r.onstart = () => {
      isListening = true;
      setOrb('listening');
      setStatus('Listening...', 'active');
    };
    r.onresult = (e) => {
      const transcript = e.results[0][0].transcript.trim();
      addMessage('user', transcript);
      respond(transcript);
    };
    r.onerror = (e) => {
      console.error(e.error);
      if (e.error === 'not-allowed') setStatus('Microphone blocked — allow access', 'error');
      else setStatus('Error: ' + e.error, 'error');
      resetOrb();
    };
    r.onend = () => {
      isListening = false;
      if (!isSpeaking) resetOrb();
    };
    return r;
  }

  // ── Toggle listen ──────────────────────────────────────────────────────────
  function toggleListen() {
    if (isSpeaking) { synth.cancel(); isSpeaking = false; }
    if (isListening) {
      recognition.stop();
      return;
    }
    recognition = setupRecognition();
    if (recognition) recognition.start();
  }

  // ── Speak ──────────────────────────────────────────────────────────────────
  function speak(text) {
    if (!synth) return;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const idx = document.getElementById('voice-select').value;
    if (voices[idx]) utt.voice = voices[idx];
    utt.rate = 0.95;
    utt.pitch = 0.85;
    utt.volume = 1;

    utt.onstart = () => { isSpeaking = true; setOrb('speaking'); setStatus('Speaking...', 'speaking'); };
    utt.onend = () => { isSpeaking = false; resetOrb(); };
    utt.onerror = () => { isSpeaking = false; resetOrb(); };
    synth.speak(utt);
  }

  function speakTest() {
    speak("Hello, I am Jarvis. Your personal AI voice assistant. How may I assist you today?");
    addMessage('jarvis', "Hello, I am Jarvis. Your personal AI voice assistant. How may I assist you today?");
  }

  // ── Response logic ─────────────────────────────────────────────────────────
  async function respond(input) {
    setStatus('Thinking...', 'active');
    setOrb('');

    const lower = input.toLowerCase();

    // Local quick answers
    const local = getLocalResponse(lower);
    if (local) {
      addMessage('jarvis', local);
      speak(local);
      return;
    }

    // Claude API
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: "You are JARVIS, a helpful and intelligent voice assistant. Keep responses concise (2-3 sentences max) and conversational — this will be spoken aloud. Be friendly, smart, and direct. Never use markdown, bullet points, or special characters.",
          messages: [{ role: "user", content: input }]
        })
      });
      const data = await res.json();
      const reply = data?.content?.[0]?.text || "I'm sorry, I couldn't process that.";
      addMessage('jarvis', reply);
      speak(reply);
    } catch (err) {
      const fallback = "I'm having trouble connecting right now. Please check your internet connection.";
      addMessage('jarvis', fallback);
      speak(fallback);
    }
  }

  function getLocalResponse(input) {
    if (/^(hi|hello|hey|good morning|good evening|howdy)/.test(input))
      return "Hello! I'm JARVIS, your personal assistant. What can I do for you today?";
    if (/your name|who are you/.test(input))
      return "I'm JARVIS — Just A Rather Very Intelligent System. Created to assist you.";
    if (/time/.test(input) && !/timezone/.test(input))
      return `The current time is ${new Date().toLocaleTimeString()}.`;
    if (/date|today/.test(input))
      return `Today is ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}.`;
    if (/thank/.test(input))
      return "You're welcome! Is there anything else I can help you with?";
    if (/bye|goodbye|see you/.test(input))
      return "Goodbye! Have a great day. I'll be here whenever you need me.";
    if (/joke/.test(input))
      return "Why do programmers prefer dark mode? Because light attracts bugs!";
    if (/weather/.test(input))
      return "I don't have live weather access right now, but you can check weather.com for the latest forecast.";
    return null;
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const log = document.getElementById('chat-log');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'You' : 'JARVIS'}</div>
      <div class="msg-bubble">${text}</div>
    `;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function setStatus(text, cls = '') {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + cls;
  }

  function setOrb(state) {
    const orb = document.getElementById('orb');
    const icon = document.getElementById('mic-icon');
    orb.className = 'orb ' + state;
    icon.textContent = state === 'speaking' ? '🔊' : '🎙️';
  }

  function resetOrb() {
    setOrb('');
    setStatus('Click the orb to speak');
  }

  function clearChat() {
    document.getElementById('chat-log').innerHTML = '';
  }
</script>
</body>
</html>
